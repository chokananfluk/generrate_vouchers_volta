// rootPath() ใน GAS = '' เพราะทุก page อยู่ใน URL เดียวกัน
function rootPath() { return CONFIG.GAS_URL + '?page='; }
// นำทางไปหน้าอื่น — พยายามเปลี่ยน top window ก่อน, ถ้าโดน cross-origin block ก็ fallback
function goPage(name) {
  var url = rootPath() + name;
  try { window.top.location.href = url; return; } catch (e) {}
  try { window.location.href = url; } catch (e2) {}
}

// ใส่โลโก้ให้ <img data-logo> ทุกตัว ถ้ามี CONFIG.LOGO_URL — ถ้าไม่มีก็ปล่อยให้ข้อความ fallback แสดง
function applyLogos_() {
  if (!CONFIG.LOGO_URL) return;
  document.querySelectorAll('img[data-logo]').forEach(function(img) {
    img.src = CONFIG.LOGO_URL;
    img.style.display = '';
    var txt = img.parentElement && img.parentElement.querySelector('.brand-logo-text');
    if (txt) txt.style.display = 'none';
  });
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', applyLogos_);
else applyLogos_();
