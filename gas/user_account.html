            <div>
              <div style="font-size:22px;font-weight:800;color:#1A1A2E" id="profile-fullname">—</div>
              <div style="font-size:14px;color:#6B6B8A" id="profile-email">—</div>

            <div><div style="font-size:12px;color:#6B6B8A;margin-bottom:2px">ฝ่าย</div><div style="font-weight:600" id="view-sec">—</div></div>
            <div><div style="font-size:12px;color:#6B6B8A;margin-bottom:2px">สายงาน/เขตพื้นที่</div><div style="font-weight:600" id="view-area">—</div></div>

<script>
let currentUser = null;

document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireLogin()) return;
  if (Auth.isAdmin()) { goPage('admin-dashboard'); return; }
  initNavActive();
  currentUser = Auth.getUser();
  renderProfile();
  await loadNotifications();
});

function renderProfile() {
  const u = currentUser;
  document.getElementById('nav-avatar').textContent      = u.firstName[0];
  document.getElementById('nav-user-name').textContent   = u.firstName + ' ' + u.lastName;
  document.getElementById('profile-avatar').textContent  = u.firstName[0];
  document.getElementById('profile-fullname').textContent= u.firstName + ' ' + u.lastName;
  document.getElementById('profile-email').textContent   = u.email;
  document.getElementById('view-phone').textContent = u.phone      || 'ไม่ได้ระบุ';
  document.getElementById('view-dept').textContent  = u.department || 'ไม่ได้ระบุ';
  document.getElementById('view-div').textContent   = u.division   || 'ไม่ได้ระบุ';
  document.getElementById('view-sec').textContent   = u.section    || 'ไม่ได้ระบุ';
  document.getElementById('view-area').textContent  = u.area       || 'ไม่ได้ระบุ';
}

function toggleEdit(on) {
  document.getElementById('view-mode').style.display = on ? 'none'  : 'block';
  document.getElementById('edit-mode').style.display = on ? 'block' : 'none';
  document.getElementById('edit-btn').style.display  = on ? 'none'  : 'inline-flex';
  if (on) {
    document.getElementById('edit-fname').value = currentUser.firstName   || '';
    document.getElementById('edit-lname').value = currentUser.lastName    || '';
    document.getElementById('edit-phone').value = currentUser.phone       || '';
    document.getElementById('edit-dept').value  = currentUser.department  || '';
    document.getElementById('edit-div').value   = currentUser.division    || '';
    document.getElementById('edit-sec').value   = currentUser.section     || '';
    document.getElementById('edit-area').value  = currentUser.area        || '';
  }
}

async function saveProfile() {
  const fn = document.getElementById('edit-fname').value.trim();
  const ln = document.getElementById('edit-lname').value.trim();
  if (!fn || !ln) { showToast('กรุณากรอกชื่อและนามสกุล', 'error'); return; }
  try {
    await API.updateUser(currentUser.id, {
      first_name: fn, last_name: ln,
      phone:      document.getElementById('edit-phone').value.trim() || null,
      department: document.getElementById('edit-dept').value.trim()  || null,
      division:   document.getElementById('edit-div').value.trim()   || null,
      section:    document.getElementById('edit-sec').value.trim()   || null,
      area:       document.getElementById('edit-area').value.trim()  || null
    });
    const session = Auth.getSession();
    session.user.firstName  = fn;
    session.user.lastName   = ln;
    session.user.phone      = document.getElementById('edit-phone').value.trim();
    session.user.department = document.getElementById('edit-dept').value.trim();
    session.user.division   = document.getElementById('edit-div').value.trim();
    session.user.section    = document.getElementById('edit-sec').value.trim();
    session.user.area       = document.getElementById('edit-area').value.trim();
    Auth.saveSession(session);
    currentUser = session.user;
    renderProfile();
    toggleEdit(false);
    showToast('บันทึกข้อมูลสำเร็จ', 'success');
  } catch(e) { showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); }
}

async function changePw() {
  const old  = document.getElementById('old-pw').value;
  const nw   = document.getElementById('new-pw').value;
  const conf = document.getElementById('confirm-pw').value;
  const errEl = document.getElementById('pw-error');
  errEl.style.display = 'none';
  if (!old || !nw || !conf) { errEl.textContent = 'กรุณากรอกข้อมูลให้ครบ'; errEl.style.display = 'block'; return; }
  if (nw.length < 8)        { errEl.textContent = 'รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัวอักษร'; errEl.style.display = 'block'; return; }
  if (nw !== conf)          { errEl.textContent = 'รหัสผ่านใหม่ไม่ตรงกัน'; errEl.style.display = 'block'; return; }
  try {
    await API.changePassword(old, nw);
    ['old-pw','new-pw','confirm-pw'].forEach(id => document.getElementById(id).value = '');
    showToast('เปลี่ยนรหัสผ่านสำเร็จ', 'success');
  } catch(e) {
    errEl.textContent = e.message.includes('incorrect') ? 'รหัสผ่านปัจจุบันไม่ถูกต้อง' : e.message;
    errEl.style.display = 'block';
  }
}

async function loadNotifications() {
  try {
    const notifs = (await API.getNotifications()) || [];
    const el = document.getElementById('notif-list');
    if (notifs.length === 0) {
      el.innerHTML = `<div class="empty-state" style="padding:32px"><div class="empty-icon">🔔</div><div class="empty-title">ไม่มีการแจ้งเตือน</div></div>`;
      return;
    }
    el.innerHTML = notifs.map(n => `
      <div class="notif-item" style="${!n.is_read?'background:rgba(176,0,212,.04);border-radius:8px;padding:10px 12px;margin:-2px 0;':''}">
        <div class="notif-icon ${n.type}">${n.type==='success'?'✅':n.type==='warning'?'⚠️':n.type==='error'?'❌':'ℹ️'}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:${n.is_read?'500':'700'}">${esc(n.title)}</div>
          <div style="font-size:13px;color:#6B6B8A;margin-top:2px">${esc(n.message)}</div>
          <div style="font-size:11px;color:#BDB8CC;margin-top:4px">${fmtDateTime(n.created_at)}</div>
        </div>
        ${!n.is_read?`<span style="width:8px;height:8px;background:#B000D4;border-radius:50%;flex-shrink:0;margin-top:6px"></span>`:''}
      </div>`).join('');
  } catch(e) { console.error(e); }
}
async function markAllRead() { await API.markAllNotificationsRead(); await loadNotifications(); showToast('อ่านการแจ้งเตือนทั้งหมดแล้ว', 'success'); }
</script>
