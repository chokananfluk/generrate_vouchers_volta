<style>
/* ============================================================
   Volta Voucher — Custom CSS
   (Supplements Tailwind CDN)
   ============================================================ */

:root {
  --purple-main:    #B000D4;
  --purple-hi:      #D100FF;
  --deep-violet:    #7E00A8;
  --cyan-neon:      #00D9FF;
  --electric-blue:  #008CFF;
  --blue-violet:    #4D4DFF;
  --purple-blend:   #7A2CFF;
  --white:          #FFFFFF;
  --bg-light:       #F9F6FF;
  --bg-card:        #FFFFFF;
  --text-primary:   #1A1A2E;
  --text-secondary: #6B6B8A;
  --border-light:   #EDE9F6;
  --shadow-sm:      0 2px 8px rgba(126,0,168,.08);
  --shadow-md:      0 4px 20px rgba(126,0,168,.12);
  --shadow-lg:      0 8px 40px rgba(126,0,168,.16);
  --radius:         12px;
  --radius-lg:      20px;
}

* { box-sizing: border-box; }

body {
  background: var(--bg-light);
  color: var(--text-primary);
  font-family: 'Noto Sans Thai', 'Sarabun', Arial, sans-serif;
  min-height: 100vh;
}

/* ============================================================
   LAYOUT — Sidebar + Main
   ============================================================ */
.app-layout {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--white);
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  box-shadow: 2px 0 12px rgba(126,0,168,.06);
  transition: transform .3s ease;
}

.sidebar-logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border-light);
}

.sidebar-logo img { width: 160px; height: auto; }

/* App logo (base64, injected via CONFIG.LOGO_URL) */
.brand-logo-side  { width: 160px; height: auto; display: block; }
.login-brand-logo { width: 240px; height: auto; margin: 0 auto 24px; display: block; filter: brightness(0) invert(1); }

.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

.nav-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 12px 8px 6px;
}

.nav-link {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px 10px 16px;
  border-radius: 10px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 2px;
  transition: background .15s, color .15s, transform .15s, box-shadow .15s;
}
.nav-link:hover { background: var(--bg-light); color: var(--purple-main); }
.nav-link.active {
  background: linear-gradient(135deg, rgba(176,0,212,.18), rgba(122,44,255,.12));
  color: var(--purple-main);
  font-weight: 700;
  box-shadow: inset 3px 0 0 var(--purple-main), 0 2px 8px rgba(176,0,212,.10);
}
.nav-link.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 8px;
  bottom: 8px;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg, var(--purple-hi), var(--purple-blend));
}
.nav-link.active .nav-icon {
  transform: scale(1.1);
  filter: drop-shadow(0 1px 2px rgba(176,0,212,.30));
}
.nav-link .nav-icon { font-size: 18px; width: 22px; text-align: center; transition: transform .15s; }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border-light);
}

.user-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--bg-light);
}

.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple-main), var(--purple-blend));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 14px;
  flex-shrink: 0;
}

.user-info { min-width: 0; }
.user-info .name  { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-info .role  { font-size: 11px; color: var(--text-secondary); }

.logout-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  color: #ef4444; font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; background: none; width: 100%;
  margin-top: 6px;
}
.logout-btn:hover { background: #fef2f2; }

/* Main content */
.main-content {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
  padding: 0;
}

/* Topbar */
.topbar {
  height: 64px;
  background: var(--white);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: sticky; top: 0; z-index: 50;
}

.topbar-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.topbar-right { display: flex; align-items: center; gap: 12px; }

/* Page content wrapper */
.page-content { padding: 28px; }

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  padding: 24px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.card-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }

/* Stat cards */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.stat-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--purple-main), var(--cyan-neon));
}

.stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 800; color: var(--text-primary); line-height: 1; }
.stat-value.purple { color: var(--purple-main); }
.stat-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.stat-icon {
  position: absolute;
  right: 16px; top: 16px;
  width: 46px; height: 46px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 23px;
  background: linear-gradient(135deg, rgba(176,0,212,.16), rgba(0,217,255,.16));
  box-shadow: inset 0 0 0 1px rgba(176,0,212,.12), 0 4px 12px rgba(126,0,168,.10);
  opacity: 1;
}
.stat-card:hover .stat-icon {
  background: linear-gradient(135deg, var(--purple-main), var(--purple-blend));
  transform: scale(1.06);
  transition: all .2s;
}

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--bg-light);
  padding: 12px 16px;
  text-align: left;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
}
tbody td {
  padding: 14px 16px;
  font-size: 14px;
  color: var(--text-primary);
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg-light); }

/* ============================================================
   BADGES
   ============================================================ */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-success   { background: #DCFCE7; color: #16A34A; }
.badge-warning   { background: #FEF9C3; color: #CA8A04; }
.badge-info      { background: #DBEAFE; color: #2563EB; }
.badge-danger    { background: #FEE2E2; color: #DC2626; }
.badge-secondary { background: #F3F4F6; color: #6B7280; }
.badge-purple    { background: rgba(176,0,212,.1); color: var(--purple-main); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  text-decoration: none;
  line-height: 1.4;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(135deg, var(--purple-main), var(--purple-blend));
  color: white;
  box-shadow: 0 2px 12px rgba(176,0,212,.3);
}
.btn-primary:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--deep-violet), var(--purple-main));
  box-shadow: 0 4px 20px rgba(176,0,212,.4);
  transform: translateY(-1px);
}

.btn-outline {
  background: white;
  color: var(--purple-main);
  border: 1.5px solid var(--purple-main);
}
.btn-outline:hover:not(:disabled) { background: rgba(176,0,212,.05); }

.btn-danger  { background: #EF4444; color: white; }
.btn-danger:hover:not(:disabled) { background: #DC2626; }

.btn-success { background: #22C55E; color: white; }
.btn-success:hover:not(:disabled) { background: #16A34A; }

.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 12px 24px; font-size: 16px; }

.btn-icon {
  width: 34px; height: 34px; padding: 0;
  border-radius: 8px;
  background: var(--bg-light);
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
  transition: all .15s;
}
.btn-icon:hover { background: var(--purple-main); color: white; border-color: var(--purple-main); }

/* ============================================================
   FORMS
   ============================================================ */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.form-label .required { color: #EF4444; margin-left: 2px; }

.form-control {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border-light);
  border-radius: 8px;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--white);
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.form-control:focus {
  border-color: var(--purple-main);
  box-shadow: 0 0 0 3px rgba(176,0,212,.12);
}
.form-control::placeholder { color: #BDB8CC; }

textarea.form-control { resize: vertical; min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media(max-width:640px){ .form-row { grid-template-columns: 1fr; } }

.value-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.value-chip {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1.5px solid var(--border-light);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  background: white;
  color: var(--text-secondary);
  transition: all .15s;
}
.value-chip:hover, .value-chip.selected {
  border-color: var(--purple-main);
  color: var(--purple-main);
  background: rgba(176,0,212,.06);
}
.value-chip.selected { box-shadow: 0 0 0 2px rgba(176,0,212,.2); }

/* File upload */
.file-drop {
  border: 2px dashed var(--border-light);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: var(--bg-light);
}
.file-drop:hover, .file-drop.dragover {
  border-color: var(--purple-main);
  background: rgba(176,0,212,.04);
}
.file-drop-icon { font-size: 40px; margin-bottom: 8px; }
.file-drop-text { font-size: 14px; color: var(--text-secondary); }
.file-drop-link { color: var(--purple-main); font-weight: 600; cursor: pointer; }

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
/* โมดัลพรีวิวใบเสร็จ ต้องอยู่หน้าโมดัลรายละเอียดเสมอ */
#modal-receipt-view { z-index: 1100; }

.modal {
  background: white;
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 540px;
  box-shadow: var(--shadow-lg);
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn .2s ease;
}
.modal-lg { max-width: 720px; }
.modal-xl { max-width: 900px; }

@keyframes modalIn {
  from { opacity: 0; transform: scale(.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1)   translateY(0);   }
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none; background: var(--bg-light);
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.modal-close:hover { background: #FEE2E2; color: #EF4444; }

.modal-body   { padding: 20px 24px; }
.modal-footer {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ============================================================
   TOAST
   ============================================================ */
.toast-container {
  position: fixed;
  bottom: 28px; right: 28px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateX(20px);
  transition: all .25s ease;
  min-width: 260px;
  max-width: 360px;
}
.toast.show { opacity: 1; transform: translateX(0); }

.toast-success { background: #DCFCE7; color: #15803D; border-left: 4px solid #22C55E; }
.toast-error   { background: #FEE2E2; color: #B91C1C; border-left: 4px solid #EF4444; }
.toast-info    { background: #DBEAFE; color: #1D4ED8; border-left: 4px solid #3B82F6; }
.toast-warning { background: #FEF9C3; color: #92400E; border-left: 4px solid #EAB308; }

.toast-icon { font-size: 16px; flex-shrink: 0; }

/* ============================================================
   LOADING OVERLAY
   ============================================================ */
#loading-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(255,255,255,.75);
  z-index: 9990;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border-light);
  border-top-color: var(--purple-main);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   LOGIN PAGE
   ============================================================ */
.login-page {
  min-height: 100vh;
  display: flex;
  background: linear-gradient(135deg, #F9F6FF 0%, #EDE0FF 100%);
}

.login-left {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  background: linear-gradient(145deg, var(--purple-main), var(--purple-blend), var(--blue-violet));
  position: relative;
  overflow: hidden;
}

.login-left::before {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: rgba(255,255,255,.07);
  top: -100px; right: -100px;
}
.login-left::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
  bottom: -80px; left: -60px;
}

.login-brand { text-align: center; position: relative; z-index: 1; }
.login-brand img { width: 220px; margin-bottom: 24px; filter: brightness(0) invert(1); }
.login-brand p { color: rgba(255,255,255,.85); font-size: 16px; line-height: 1.6; max-width: 320px; margin: 0 auto; }

/* password show/hide toggle (ใช้ได้ทุกหน้า) */
.input-wrap { position: relative; }
.pw-toggle  {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: #9CA3AF; background: none; border: none; font-size: 18px;
  padding: 0; line-height: 1;
}

.login-right {
  width: 480px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px;
  padding-top: 60px;
  background: white;
  overflow-y: auto;
}

.login-box { width: 100%; max-width: 360px; }
.login-box h2 { font-size: 26px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
.login-box p  { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }

@media(max-width:768px) {
  .login-left  { display: none; }
  .login-right { width: 100%; }
}

/* ============================================================
   PAGINATION
   ============================================================ */
.pagination { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 16px; }
.page-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1.5px solid var(--border-light);
  background: white;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.page-btn:hover, .page-btn.active {
  border-color: var(--purple-main);
  color: var(--purple-main);
  background: rgba(176,0,212,.06);
}
.page-btn.active { background: var(--purple-main); color: white; }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ============================================================
   MISC
   ============================================================ */
.divider { height: 1px; background: var(--border-light); margin: 20px 0; }

.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon  { font-size: 64px; margin-bottom: 12px; opacity: .4; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text-secondary); }
.empty-desc  { font-size: 14px; color: #BDB8CC; margin-top: 4px; }

.search-bar {
  position: relative;
  display: flex;
  align-items: center;
}
.search-bar input {
  padding-left: 36px;
  width: 240px;
}
.search-bar .search-icon {
  position: absolute;
  left: 11px;
  color: var(--text-secondary);
  font-size: 15px;
  pointer-events: none;
}

.filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.notification-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--purple-main);
  display: inline-block;
}

.notif-item {
  display: flex;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-light);
  align-items: flex-start;
}
.notif-item:last-child { border-bottom: none; }
.notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.notif-icon.success { background: #DCFCE7; }
.notif-icon.warning { background: #FEF9C3; }
.notif-icon.error   { background: #FEE2E2; }
.notif-icon.info    { background: #DBEAFE; }

.section-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.section-sub {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

/* Gradient heading accent */
.gradient-text {
  background: linear-gradient(135deg, var(--purple-main), var(--cyan-neon));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Mobile sidebar toggle */
.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-primary);
  padding: 4px;
}

@media(max-width:768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .sidebar-toggle { display: block; }
  .page-content { padding: 16px; }
}

/* Steps indicator for voucher creation */
.steps { display: flex; align-items: center; gap: 0; margin-bottom: 28px; }
.step  { display: flex; align-items: center; gap: 8px; flex: 1; }
.step-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  background: var(--border-light);
  color: var(--text-secondary);
  flex-shrink: 0;
  transition: all .2s;
}
.step.active .step-num  { background: var(--purple-main); color: white; }
