<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>Volta Voucher — ตั้งรหัสผ่านใหม่</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <?!= include('_css'); ?>
  <style>
    .pw-toggle  { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#9CA3AF; background:none; border:none; font-size:18px; }
    .input-wrap { position:relative; }
  </style>
</head>
<body>

<div class="login-page">
  <!-- Left brand panel -->
  <div class="login-left">
    <div class="login-brand">
      <img data-logo class="login-brand-logo" alt="Volta Voucher" style="display:none">
      <div class="brand-logo-text" style="color:white;font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:24px">
        ⚡ Volta Voucher
      </div>
      <p>ตั้งรหัสผ่านใหม่ของคุณ<br>เพื่อกลับเข้าใช้งานระบบ</p>
    </div>
  </div>

  <!-- Right form -->
  <div class="login-right">
    <div class="login-box">
      <h2>ตั้งรหัสผ่านใหม่</h2>
      <p>กรุณากำหนดรหัสผ่านใหม่สำหรับบัญชีของคุณ</p>

      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label">รหัสผ่านใหม่ <span class="required">*</span></label>
          <div class="input-wrap">
            <input id="new-password" type="password" class="form-control" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6">
            <button type="button" class="pw-toggle" onclick="togglePw('new-password', this)">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">ยืนยันรหัสผ่านใหม่ <span class="required">*</span></label>
          <div class="input-wrap">
            <input id="confirm-password" type="password" class="form-control" placeholder="พิมพ์รหัสผ่านอีกครั้ง" required minlength="6">
            <button type="button" class="pw-toggle" onclick="togglePw('confirm-password', this)">👁</button>
          </div>
        </div>

        <div id="reset-msg" style="display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px"></div>

        <button type="submit" id="reset-btn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">
          <span id="reset-btn-text">บันทึกรหัสผ่านใหม่</span>
          <span id="reset-btn-spinner" style="display:none">กำลังบันทึก...</span>
        </button>
      </form>

      <div style="text-align:center;margin-top:16px">
        <a href="javascript:void(0)" onclick="goPage('login')" style="font-size:13px;color:#B000D4;font-weight:600;text-decoration:none">← กลับไปเข้าสู่ระบบ</a>
      </div>
    </div>
  </div>
</div>

<?!= include('_js_config'); ?>
<?!= include('_js_auth');   ?>
<?!= include('_js_api');    ?>

<script>
  // Token ถูกฝังจากฝั่ง server ผ่าน servePage_ (ลิงก์ ?page=reset&token=...)
  const TOKEN = '<?= resetToken ?>';

  document.addEventListener('DOMContentLoaded', () => {
    if (!TOKEN) {
      showMsg('ลิงก์รีเซ็ตไม่ถูกต้องหรือหมดอายุแล้ว กรุณาขอลิงก์ใหม่จากหน้าเข้าสู่ระบบ', 'error');
      document.getElementById('reset-btn').disabled = true;
    }
  });

  function showMsg(text, type) {
    const m = document.getElementById('reset-msg');
    m.style.background = type === 'error' ? '#FEE2E2' : '#DCFCE7';
    m.style.color      = type === 'error' ? '#DC2626' : '#15803D';
    m.textContent      = text;
    m.style.display    = 'block';
  }

  async function handleReset(e) {
    e.preventDefault();
    const pw  = document.getElementById('new-password').value;
    const cf  = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-btn');
    const txt = document.getElementById('reset-btn-text');
    const sp  = document.getElementById('reset-btn-spinner');

    if (pw !== cf)      { showMsg('รหัสผ่านทั้งสองช่องไม่ตรงกัน', 'error'); return; }
    if (pw.length < 6)  { showMsg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error'); return; }

    btn.disabled = true; txt.style.display = 'none'; sp.style.display = 'inline';
    try {
      await API.resetPassword(TOKEN, pw);
      showMsg('ตั้งรหัสผ่านใหม่สำเร็จ! กำลังพาไปยังหน้าเข้าสู่ระบบ...', 'success');
      Auth.clearSession();
      setTimeout(() => goPage('login'), 1500);
    } catch(err) {
      showMsg('เกิดข้อผิดพลาด: ' + err.message, 'error');
      btn.disabled = false; txt.style.display = 'inline'; sp.style.display = 'none';
    }
  }

  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text';     btn.textContent = '🙈'; }
    else                         { inp.type = 'password'; btn.textContent = '👁';  }
  }
</script>
</body>
</html>
